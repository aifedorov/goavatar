services:
  postgres:
    image: postgres:17
    container_name: goavatar-postgres
    environment:
      POSTGRES_DB: goavatar
      POSTGRES_USER: goavatar
      POSTGRES_PASSWORD: password
      PGPORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U goavatar -d goavatar" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - goavatar-network

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: goavatar-migrate
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://goavatar:password@postgres:5432/goavatar?sslmode=disable", "up" ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goavatar-network
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: goavatar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - goavatar-network

  minio-setup:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: goavatar-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/avatars
      "
    networks:
      - goavatar-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: goavatar-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+sbwt none +sbwtdcpu none +sbwtdio none"
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - goavatar-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: goavatar:latest
    container_name: goavatar-server
    environment:
      DATABASE_URI: "postgres://goavatar:password@postgres:5432/goavatar?sslmode=disable"
      HTTP_ADDRESS: "0.0.0.0:8080"
      LOG_LEVEL: "debug"
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "avatars"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_USE_SSL: "false"
      RABBITMQ_URL: "amqp://rabbitmq:rabbitmq@rabbitmq:5672/"
      STATIC_DIR: "/app/web/static"
      OTEL_SERVICE_NAME: "goavatar-server"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - goavatar-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: goavatar:latest
    container_name: goavatar-worker
    command: ["/app/worker"]
    environment:
      DATABASE_URI: "postgres://goavatar:password@postgres:5432/goavatar?sslmode=disable"
      LOG_LEVEL: "debug"
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "avatars"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_USE_SSL: "false"
      RABBITMQ_URL: "amqp://rabbitmq:rabbitmq@rabbitmq:5672/"
      OTEL_SERVICE_NAME: "goavatar-worker"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - goavatar-network
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: goavatar-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - goavatar-network

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: goavatar-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - goavatar-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: goavatar-otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./deploy/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      opensearch:
        condition: service_healthy
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - goavatar-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: goavatar-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - goavatar-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: goavatar-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
      - otel-collector
    networks:
      - goavatar-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: goavatar-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
      - opensearch
    networks:
      - goavatar-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  rabbitmq_data:
    driver: local
  opensearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  goavatar-network:
    driver: bridge