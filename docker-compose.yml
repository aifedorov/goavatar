services:
  postgres:
    image: postgres:17
    container_name: goavatar-postgres
    environment:
      POSTGRES_DB: goavatar
      POSTGRES_USER: goavatar
      POSTGRES_PASSWORD: password
      PGPORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U goavatar -d goavatar" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - goavatar-network

  migrate:
    image: migrate/migrate:v4.18.1
    container_name: goavatar-migrate
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://goavatar:password@postgres:5432/goavatar?sslmode=disable", "up" ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goavatar-network
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: goavatar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - goavatar-network

  minio-setup:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: goavatar-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/avatars
      "
    networks:
      - goavatar-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: goavatar-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+sbwt none +sbwtdcpu none +sbwtdio none"
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - goavatar-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: goavatar:latest
    container_name: goavatar-server
    environment:
      DATABASE_URI: "postgres://goavatar:password@postgres:5432/goavatar?sslmode=disable"
      HTTP_ADDRESS: "0.0.0.0:8080"
      LOG_LEVEL: "debug"
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "avatars"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_USE_SSL: "false"
      RABBITMQ_URL: "amqp://rabbitmq:rabbitmq@rabbitmq:5672/"
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - goavatar-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  goavatar-network:
    driver: bridge