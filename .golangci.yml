version: "2"

run:
  timeout: 3m

linters:
  default: none
  exclusions:
    paths:
      - ".*\\.generated\\.go$"
      - ".*\\.pb\\.go$"
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - goconst
      - text: "SA1019:"
        linters:
          - staticcheck
      - text: "this value of .* is never used"
        linters:
          - staticcheck
      - text: "G107:"
        linters:
          - gosec
  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map

    funlen:
      lines: 100
      statements: 50
      ignore-comments: true

    gocognit:
      min-complexity: 20

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-tags:
        - experimental
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    govet:
      enable-all: false
      enable:
        - assign
        - atomic
        - bools
        - cgocall
        - copylocks
        - errorsas
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
      disable:
        - fieldalignment
        - shadow

    staticcheck:
      checks:
        - all
        - "-ST1000"

  enable:
    # Core linters for basic code quality
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional stable linters
    - bodyclose
    - errname
    - errorlint
    - gosec
    - nilerr
    - noctx
    - unconvert

issues:
  max-same-issues: 50